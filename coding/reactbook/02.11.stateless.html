<!doctype html>
<html>
  <head>
    <title>React Application stateless</title>
    <meta charset="utf-8" />
  </head>
  <body>
    <div id="app"></div>
    <div id="textcount"></div>
    <script src="react/react.js"></script>
    <script src="react/react-dom.js"></script>
    <script src="react/babel.js"></script>
    <script type="text/babel">
      class MyComponentTitle extends React.Component {
        render() {
          return (
            <span>
              I am{" "}
              <em>
                {this.props.name} {this.props.lastname}
              </em>
            </span>
          );
        }
      }
      const MyText = function ({ textValue }) {
        let text = textValue;
        return (
          <div>
            <textarea defaultValue={text} />
            <h3>{text.length}</h3>
          </div>
        );
      };
      MyComponentTitle.defaultProps = {
        lastname: "",
      };
      ReactDOM.render(
        <MyComponentTitle name="Titor" />,
        document.getElementById("app"),
      );
      ReactDOM.render(
        <MyText textValue="Prueba" />,
        document.getElementById("textcount"),
      );
    </script>
  </body>
</html>
