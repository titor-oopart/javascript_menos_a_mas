<!doctype html>
<html>
  <head>
    <title>Sort Table</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" type="text/css" href="03.table.css" />
  </head>
  <body>
    <div id="app"></div>
    <script src="react/react.js"></script>
    <script src="react/react-dom.js"></script>
    <script src="react/babel.js"></script>
    <script src="react/prop-types.js"></script>
    <script type="text/babel">
      const headers = ["Book", "Author", "Language", "Published", "Sales"];
      const data = [
        [
          "A Tale of Two Cities",
          "Charles Dickens",
          "English",
          "1859",
          "200 million",
        ],
        [
          "Le Petit Prince (The Little Prince)",
          "Antoine de Saint-Exupéry",
          "French",
          "1943",
          "150 million",
        ],
        [
          "Harry Potter and the Philosopher's Stone",
          "J. K. Rowling",
          "English",
          "1997",
          "120 million",
        ],
        [
          "And Then There Were None",
          "Agatha Christie",
          "English",
          "1939",
          "100 million",
        ],
        [
          "Dream of the Red Chamber",
          "Cao Xueqin",
          "Chinese",
          "1791",
          "100 million",
        ],
        ["The Hobbit", "J. R. R. Tolkien", "English", "1937", "100 million"],
      ];

      function clone(o) {
        return JSON.parse(JSON.stringify(o));
      }

      class Excell extends React.Component {
        constructor(props) {
          super();
          this.state = { data: props.initialData };
          this.sort = this.sort.bind(this);
        }
        sort(e) {
          const column = e.target.cellIndex;
          console.log(column, e.target);
          const data = clone(this.state.data);
          data.sort((a, b) => {
            if (a[column] === b[column]) {
              return 0;
            }
            return a[column] > b[column] ? 1 : -1;
          });
          this.setState({ data });
        }
        render() {
          const headers = [];
          for (const idx in this.props.headers) {
            const header = this.props.headers[idx];
            headers.push(<th key={idx}>{header}</th>);
          }
          return (
            <div>
              <h3>Table</h3>
              <table>
                <thead onClick={this.sort}>
                  <tr>{headers}</tr>
                </thead>
                <tbody>
                  {this.state.data.map((row, idx) => (
                    <tr key={idx}>
                      {row.map((cell, idx) => (
                        <td key={idx}>{cell}</td>
                      ))}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          );
        }
      }
      Excell.propTypes = {
        headers: PropTypes.arrayOf(PropTypes.string),
        initialData: PropTypes.arrayOf(PropTypes.arrayOf(PropTypes.string)),
      };
      ReactDOM.render(
        <Excell headers={headers} initialData={data} />,
        document.getElementById("app"),
      );
    </script>
  </body>
</html>
