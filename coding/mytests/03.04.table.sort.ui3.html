<!doctype html>
<html>
  <head>
    <title>React Table Sort</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" type="text/css" href="../reactbook/03.table.css" />
  </head>
  <body>
    <div id="app"></div>
    <script src="../reactbook/react/react.js"></script>
    <script src="../reactbook/react/react-dom.js"></script>
    <script src="../reactbook/react/babel.js"></script>
    <script src="../reactbook/react/prop-types.js"></script>
    <script type="text/babel">
      function clone(o) {
        return JSON.parse(JSON.stringify(o));
      }
      class MyApp extends React.Component {
        constructor(props) {
          super();
          this.state = {
            data: props.initialData,
            sortby: null,
            descending: false,
            edit: null, // {row: index, column: index}
          };
          this.sort = this.sort.bind(this);
          this.showEditor = this.showEditor.bind(this);
          this.save = this.save.bind(this);
        }
        sort(e) {
          const column = e.target.cellIndex;
          const data = clone(this.state.data);
          const descending =
            column === this.state.sortby ? !this.state.descending : true;
          data.sort((a, b) => {
            if (a[column] === b[column]) {
              return 0;
            }
            return descending
              ? a[column] > b[column]
                ? 1
                : -1
              : a[column] < b[column]
                ? 1
                : -1;
          });
          this.setState({ data, sortby: column, descending });
        }
        showEditor(e) {
          console.log(e.target);
          this.setState({
            edit: {
              row: parseInt(e.target.parentNode.dataset.row, 10),
              column: e.target.cellIndex,
            },
          });
        }
        save(e) {
          e.preventDefault();
          const input = e.target.firstChild;
          const data = clone(this.state.data);
          data[this.state.edit.row][this.state.edit.column] = input.value;
          this.setState({ edit: null, data });
        }
        render() {
          return (
            <div>
              <table>
                <thead onClick={this.sort}>
                  <tr>
                    {this.props.headers.map((title, idx) => {
                      if (idx === this.state.sortby) {
                        title += this.state.descending ? " \u2191" : " \u2193";
                      }
                      return <th key={idx}>{title}</th>;
                    })}
                  </tr>
                </thead>
                <tbody onDoubleClick={this.showEditor}>
                  {this.state.data.map((row, idx) => (
                    <tr key={idx} data-row={idx}>
                      {row.map((cell, cidx) => {
                        const edit = this.state.edit;
                        if (edit && edit.row === idx && edit.column === cidx) {
                          cell = (
                            <form onSubmit={this.save}>
                              <input type="text" defaultValue={cell} />
                            </form>
                          );
                        }
                        return <td key={cidx}>{cell}</td>;
                      })}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          );
        }
      }
      const headers = ["Book", "Author", "Language", "Published", "Sales"];
      const data = [
        [
          "A Tale of Two Cities",
          "Charles Dickens",
          "English",
          "1859",
          "200 million",
        ],
        [
          "Le Petit Prince (The Little Prince)",
          "Antoine de Saint-Exupéry",
          "French",
          "1943",
          "150 million",
        ],
        [
          "Harry Potter and the Philosopher's Stone",
          "J. K. Rowling",
          "English",
          "1997",
          "120 million",
        ],
        [
          "And Then There Were None",
          "Agatha Christie",
          "English",
          "1939",
          "100 million",
        ],
        [
          "Dream of the Red Chamber",
          "Cao Xueqin",
          "Chinese",
          "1791",
          "100 million",
        ],
        ["The Hobbit", "J. R. R. Tolkien", "English", "1937", "100 million"],
      ];

      ReactDOM.render(
        <MyApp headers={headers} initialData={data} />,
        document.getElementById("app"),
      );
    </script>
  </body>
</html>
