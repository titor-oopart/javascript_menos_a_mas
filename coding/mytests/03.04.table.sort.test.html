<!doctype html>
<html>
  <head>
    <title>Table Sort</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" type="text/css" href="../reactbook/03.table.css" />
  </head>
  <body>
    <div id="app"></div>
    <script src="../reactbook/react/react.js"></script>
    <script src="../reactbook/react/react-dom.js"></script>
    <script src="../reactbook/react/babel.js"></script>
    <script src="../reactbook/react/prop-types.js"></script>
    <script type="text/babel">
      function clone(o) {
        return JSON.parse(JSON.stringify(o));
      }
      class MyApp extends React.Component {
        constructor(props) {
          super();
          this.state = { data: props.initialData };
          this.sort = this.sort.bind(this);
        }
        sort(e) {
          const column = e.target.cellIndex;
          console.log(column);
          const data = clone(this.state.data);
          data.sort((a, b) => {
            console.log(a, a[column], b, b[column]);
            if (a[column] === b[column]) {
              return 0;
            }
            return a[column] > b[column] ? 1 : -1;
          });
          console.log("sorting");
          this.setState({ data });
        }
        render() {
          return (
            <div>
              <table>
                <thead onClick={this.sort}>
                  <tr>
                    {this.props.headers.map((title, idx) => {
                      return <th key={idx}>{title}</th>;
                    })}
                  </tr>
                </thead>
                <tbody>
                  {this.state.data.map((row, idx) => (
                    <tr key={idx}>
                      {row.map((cell, cidx) => (
                        <td key={cidx}>{cell}</td>
                      ))}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          );
        }
      }
      const headers = ["Book", "Author", "Language", "Published", "Sales"];
      const data = [
        [
          "A Tale of Two Cities",
          "Charles Dickens",
          "English",
          "1859",
          "200 million",
        ],
        [
          "Le Petit Prince (The Little Prince)",
          "Antoine de Saint-Exupéry",
          "French",
          "1943",
          "150 million",
        ],
        [
          "Harry Potter and the Philosopher's Stone",
          "J. K. Rowling",
          "English",
          "1997",
          "120 million",
        ],
        [
          "And Then There Were None",
          "Agatha Christie",
          "English",
          "1939",
          "100 million",
        ],
        [
          "Dream of the Red Chamber",
          "Cao Xueqin",
          "Chinese",
          "1791",
          "100 million",
        ],
        ["The Hobbit", "J. R. R. Tolkien", "English", "1937", "100 million"],
      ];

      ReactDOM.render(
        <MyApp headers={headers} initialData={data} />,
        document.getElementById("app"),
      );
    </script>
  </body>
</html>
