<!doctype html>
<html>
  <head>
    <title>My App Seach on a table</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" type="text/css" href="../reactbook/03.table.css" />
  </head>
  <body>
    <div id="app"></div>
    <script src="../reactbook/react/react.js"></script>
    <script src="../reactbook/react/react-dom.js"></script>
    <script src="../reactbook/react/babel.js"></script>
    <script src="../reactbook/react/prop-types.js"></script>
    <script type="text/babel">
      class MyApp extends React.Component {
        constructor(props) {
          super();
          this.state = { data: props.initialData, search: false };
          this.preSearchData = null;
          this.toggleSearch = this.toggleSearch.bind(this);
          this.search = this.search.bind(this);
        }
        search(e) {
          console.log("Hello World");
        }
        toggleSearch(e) {
          console.log("Hello World");
        }
        render() {
          return (
            <div>
              <button className="toolbar" onClick={this.toggleSearch}>
                {this.state.search ? "Hide Search" : "Show Search"}
              </button>
              <table>
                <thead>
                  <tr>
                    {this.props.headers.map((title, idx) => (
                      <th key={idx}>{title}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {this.state.data.map((row, idx) => (
                    <tr key={idx}>
                      {row.map((cell, cidx) => (
                        <td key={cidx}>{cell}</td>
                      ))}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          );
        }
      }
      const headers = ["Book", "Author", "Language", "Published", "Sales"];
      const data = [
        [
          "A Tale of Two Cities",
          "Charles Dickens",
          "English",
          "1859",
          "200 million",
        ],
        [
          "Le Petit Prince (The Little Prince)",
          "Antoine de Saint-Exupéry",
          "French",
          "1943",
          "150 million",
        ],
        [
          "Harry Potter and the Philosopher's Stone",
          "J. K. Rowling",
          "English",
          "1997",
          "120 million",
        ],
        [
          "And Then There Were None",
          "Agatha Christie",
          "English",
          "1939",
          "100 million",
        ],
        [
          "Dream of the Red Chamber",
          "Cao Xueqin",
          "Chinese",
          "1791",
          "100 million",
        ],
        ["The Hobbit", "J. R. R. Tolkien", "English", "1937", "100 million"],
      ];
      ReactDOM.render(
        <MyApp headers={headers} initialData={data} />,
        document.getElementById("app"),
      );
    </script>
  </body>
</html>
