<!DOCTYPE >
<html>
  <head>
    <title>My app</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" type="text/css" href="../reactbook/03.table.css" />
  </head>
  <body>
    <div id="app"></div>
    <script src="../reactbook/react/react.js"></script>
    <script src="../reactbook/react/react-dom.js"></script>
    <script src="../reactbook/react/babel.js"></script>
    <script src="../reactbook/react/prop-types.js"></script>
    <script type="text/babel">
      function clone(o) {
        return JSON.parse(JSON.stringify(o));
      }
      class MyApp extends React.Component {
        constructor() {
          super();
          this.state = {};
          this.sort = this.sort.bind(this);
        }
        sort(e) {
          const data = clone(this.props.data);
          this.setState({ data });
        }
        render() {
          const data = this.state.data ? this.state.data : this.props.data;
          const headers = [];
          for (const idx in this.props.headers) {
            const header = this.props.headers[idx];
            headers.push(<th key={idx}>{header}</th>);
          }
          return (
            <div>
              <table>
                <thead onClick={this.sort}>
                  <tr>{headers}</tr>
                </thead>
                <tbody>
                  {data.map((row, idx) => (
                    <tr key={idx}>
                      {row.map((cell, cidx) => (
                        <td key={cidx}>{cell}</td>
                      ))}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          );
        }
      }
      const headers = ["Book", "Author", "Language", "Published", "Sales"];
      const data = [
        [
          "A Tale of Two Cities",
          "Charles Dickens",
          "English",
          "1859",
          "200 million",
        ],
        [
          "Le Petit Prince (The Little Prince)",
          "Antoine de Saint-Exupéry",
          "French",
          "1943",
          "150 million",
        ],
        [
          "Harry Potter and the Philosopher's Stone",
          "J. K. Rowling",
          "English",
          "1997",
          "120 million",
        ],
        [
          "And Then There Were None",
          "Agatha Christie",
          "English",
          "1939",
          "100 million",
        ],
        [
          "Dream of the Red Chamber",
          "Cao Xueqin",
          "Chinese",
          "1791",
          "100 million",
        ],
        ["The Hobbit", "J. R. R. Tolkien", "English", "1937", "100 million"],
      ];

      ReactDOM.render(
        <MyApp headers={headers} data={data} />,
        document.getElementById("app"),
      );
    </script>
  </body>
</html>
